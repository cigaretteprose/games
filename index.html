<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch The Ball</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #4facfe, #00f2fe);
}
canvas { display: block; }
#ui {
  position: fixed;
  top: 15px;
  left: 15px;
  color: white;
  font-size: 28px;
  font-weight: bold;
  background: rgba(0,0,0,0.35);
  padding: 10px 18px;
  border-radius: 12px;
}
#gameOver {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.55);
}
.panel {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  min-width: 300px;
}
button {
  margin-top: 15px;
  padding: 12px 24px;
  border: none;
  border-radius: 10px;
  background: #ff4757;
  color: white;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>
<body>
<div id="ui">🏆 Score: <span id="score">0</span></div>
<div id="gameOver">
  <div class="panel">
    <h1>💀 Game Over</h1>
    <p>Skor Akhir: <span id="finalScore">0</span></p>
    <button onclick="restartGame()">🔄 Main Lagi</button>
  </div>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const finalScoreEl = document.getElementById('finalScore');
const gameOverEl = document.getElementById('gameOver');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  basket.y = canvas.height - 80;
}
window.addEventListener('resize', resize);

const basket = {
  x: 200,
  y: 0,
  width: 120,
  height: 40
};

const balls = [];
let score = 0;
let running = true;
let spawnTimer = 0;

function spawnBall() {
  balls.push({
    x: Math.random() * (canvas.width - 40),
    y: -40,
    speed: 3 + Math.random() * 3,
    emoji: Math.random() < 0.15 ? '💣' : '🏀'
  });
}

function drawBackground() {
  ctx.fillStyle = '#7ed6df';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.font = '80px Arial';
  ctx.fillText('☀️', 20, 90);

  ctx.fillStyle = '#2ecc71';
  ctx.fillRect(0, canvas.height - 30, canvas.width, 30);
}

function drawBasket() {
  ctx.font = '72px Arial';
  ctx.fillText('🧺', basket.x, basket.y + 55);
}

function updateBalls() {
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    b.y += b.speed;

    ctx.font = '42px Arial';
    ctx.fillText(b.emoji, b.x, b.y);

    const caught =
      b.x + 20 > basket.x &&
      b.x < basket.x + basket.width &&
      b.y + 20 > basket.y &&
      b.y < basket.y + basket.height + 20;

    if (caught) {
      if (b.emoji === '💣') {
        endGame();
        return;
      } else {
        score += 10;
        scoreEl.textContent = score;
      }
      balls.splice(i, 1);
      continue;
    }

    if (b.y > canvas.height) {
      if (b.emoji === '🏀') {
        endGame();
        return;
      }
      balls.splice(i, 1);
    }
  }
}

function endGame() {
  running = false;
  finalScoreEl.textContent = score;
  gameOverEl.style.display = 'flex';
}

function restartGame() {
  score = 0;
  scoreEl.textContent = '0';
  balls.length = 0;
  running = true;
  gameOverEl.style.display = 'none';
  loop();
}

window.restartGame = restartGame;

window.addEventListener('mousemove', e => {
  basket.x = e.clientX - basket.width / 2;
});

window.addEventListener('touchmove', e => {
  basket.x = e.touches[0].clientX - basket.width / 2;
  e.preventDefault();
}, { passive: false });

function loop() {
  if (!running) return;

  drawBackground();
  drawBasket();

  spawnTimer++;
  if (spawnTimer > 40) {
    spawnBall();
    spawnTimer = 0;
  }

  updateBalls();

  requestAnimationFrame(loop);
}

resize();
loop();
</script>
</body>
</html>
