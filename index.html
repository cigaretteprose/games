<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catch The Ball</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#111;
    font-family:Arial, sans-serif;
}

canvas{
    display:block;
    background:linear-gradient(to bottom,#1e3c72,#2a5298);
}

#scoreBoard{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-size:32px;
    font-weight:bold;
    background:rgba(0,0,0,0.4);
    padding:10px 20px;
    border-radius:12px;
}

#gameOver{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    display:none;
}

#gameOver h1{
    margin-bottom:15px;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#ff4757;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}
</style>
</head>
<body>

<div id="scoreBoard">Score: <span id="score">0</span></div>

<div id="gameOver">
    <h1>GAME OVER</h1>
    <p>Score Kamu: <span id="finalScore">0</span></p>
    <button onclick="restartGame()">Main Lagi</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d')

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let gameRunning = true;

const basket = {
    width: 140,
    height: 30,
    x: canvas.width / 2 - 70,
    y: canvas.height - 60,
    speed: 9
};

const balls = [];

class Ball {
    constructor(){
        this.x = Math.random() * (canvas.width - 40);
        this.y = -40;
        this.radius = 20;
        this.speed = 3 + Math.random() * 3;
        this.emoji = '🏀';
    }

    update(){
        this.y += this.speed;
    }

    draw(){
        ctx.font = '40px Arial';
        ctx.fillText(this.emoji, this.x, this.y);
    }
}

function spawnBall(){
    balls.push(new Ball());
}

setInterval(() => {
    if(gameRunning){
        spawnBall();
    }
}, 1000);

const keys = {};

window.addEventListener('keydown', (e)=>{
    keys[e.key] = true;
});

window.addEventListener('keyup', (e)=>{
    keys[e.key] = false;
});

function drawBasket(){
    ctx.fillStyle = '#ff4757';
    ctx.fillRect(basket.x, basket.y, basket.width, basket.height);

    ctx.font = '60px Arial';
    ctx.fillText('🧺', basket.x + 35, basket.y + 50);
}

function updateBasket(){
    if(keys['ArrowLeft'] && basket.x > 0){
        basket.x -= basket.speed;
    }

    if(keys['ArrowRight'] && basket.x + basket.width < canvas.width){
        basket.x += basket.speed;
    }
}

function checkCollision(ball){
    return (
        ball.x > basket.x &&
        ball.x < basket.x + basket.width &&
        ball.y > basket.y - 20
    );
}

function gameLoop(){
    if(!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Background stars
    for(let i=0;i<50;i++){
        ctx.fillStyle='white';
        ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,2,2);
    }
    
    updateBasket();
    drawBasket();

    for(let i=balls.length-1;i>=0;i--){
        const ball = balls[i];

        ball.update();
        ball.draw();

        if(checkCollision(ball)){
            score++;
            document.getElementById('score').innerText = score;
            balls.splice(i,1);
        }

        else if(ball.y > canvas.height){
            gameOver();
        }
    }

    requestAnimationFrame(gameLoop);
}

function gameOver(){
    gameRunning = false;
    document.getElementById('finalScore').innerText = score;
    document.getElementById('gameOver').style.display = 'block';
}

function restartGame(){
    location.reload();
}

window.canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    basket.y = canvas.height - 60;
});

gameLoop();
</script>

</body>
</html>('resize', ()=>{
