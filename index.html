<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catch The Ball Game</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #87CEEB 0%, #4CAF50 100%);
    overflow: hidden;
    user-select: none;
}

canvas {
    display: block;
    margin: 0 auto;
    background: linear-gradient(180deg, #87CEEB 0%, #B3E5FC 50%, #66BB6A 100%);
    box-shadow: 0 0 30px rgba(0,0,0,0.3);
}

#ui {
    position: fixed;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.9);
    padding: 12px 24px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    display: flex;
    gap: 25px;
    font-weight: bold;
    font-size: 20px;
    z-index: 10;
}

#startScreen, #gameOverScreen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 20;
}

.panel {
    background: white;
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    max-width: 420px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    animation: popIn 0.5s ease;
}

@keyframes popIn {
    from {
        transform: scale(0.7);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

h1 {
    font-size: 42px;
    margin-bottom: 15px;
    color: #2196F3;
}

p {
    margin: 10px 0;
    font-size: 18px;
    color: #444;
}

button {
    margin-top: 20px;
    padding: 14px 32px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg, #2196F3, #21CBF3);
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.25s;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 8px 20px rgba(33,150,243,0.4);
}

.hidden {
    display: none !important;
}
</style>
</head>
<body>

<div id="ui">
    <div>🏆 Skor: <span id="score">0</span></div>
    <div>❤️ Nyawa: <span id="lives">3</span></div>
    <div>⚡ Level: <span id="level">1</span></div>
</div>

<div id="startScreen">
    <div class="panel">
        <h1>🏀 Catch The Ball</h1>
        <p>Tangkap bola untuk mendapatkan skor!</p>
        <p>Hindari bom 💣!</p>
        <p>Kontrol dengan mouse atau sentuh layar.</p>
        <button onclick="startGame()">▶ Mulai Game</button>
    </div>
</div>

<div id="gameOverScreen" class="hidden">
    <div class="panel">
        <h1>💀 Game Over</h1>
        <p>Skor Akhir: <strong id="finalScore">0</strong></p>
        <button onclick="restartGame()">🔄 Main Lagi</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let lives = 3;
let level = 1;
let gameRunning = false;

const basket = {
    x: canvas.width / 2,
    y: canvas.height - 80,
    width: 100,
    height: 50,
    emoji: "🧺"
};

const items = [];
const particles = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    basket.y = canvas.height - 80;
}
window.addEventListener("resize", resizeCanvas);

class FallingItem {
    constructor() {
        this.x = Math.random() * (canvas.width - 40);
        this.y = -50;
        this.size = 40;
        this.isBomb = Math.random() < 0.2;
        this.emoji = this.isBomb ? "💣" : "🏀";
        this.speed = 3 + Math.random() * 2 + level * 0.5;
        this.rotation = Math.random() * Math.PI * 2;
    }

    update() {
        this.y += this.speed;
        this.rotation += 0.05;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x + this.size / 2, this.y + this.size / 2);
        ctx.rotate(this.rotation);
        ctx.font = this.size + "px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(this.emoji, 0, 0);
        ctx.restore();
    }
}

class Particle {
    constructor(x, y, emoji) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6;
        this.life = 40;
        this.emoji = emoji;
        this.size = 24;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.05;
        this.life--;
    }

    draw() {
        ctx.globalAlpha = this.life / 40;
        ctx.font = this.size + "px Arial";
        ctx.fillText(this.emoji, this.x, this.y);
        ctx.globalAlpha = 1;
    }
}

function createParticles(x, y, emoji) {
    for (let i = 0; i < 10; i++) {
        particles.push(new Particle(x, y, emoji));
    }
}

function drawBasket() {
    ctx.font = "70px Arial";
    ctx.textAlign = "center";
    ctx.fillText(basket.emoji, basket.x, basket.y);
}

function updateUI() {
    document.getElementById("score").textContent = score;
    document.getElementById("lives").textContent = lives;
    document.getElementById("level").textContent = level;
}

function checkCollision(item) {
    return (
        item.x + item.size > basket.x - basket.width / 2 &&
        item.x < basket.x + basket.width / 2 &&
        item.y + item.size > basket.y - 40 &&
        item.y < basket.y + 20
    );
}

function gameLoop() {
    if (!gameRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Matahari animasi
    const sunX = 100;
    const sunY = 100 + Math.sin(Date.now() * 0.002) * 10;
    ctx.font = "80px Arial";
    ctx.fillText("☀️", sunX, sunY);

    drawBasket();

    // Spawn item
    if (Math.random() < 0.03 + level * 0.002) {
        items.push(new FallingItem());
    }

    // Update item
    for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        item.update();
        item.draw();

        if (checkCollision(item)) {
            if (item.isBomb) {
                lives--;
                createParticles(item.x, item.y, "💥");
            } else {
                score += 10;
                createParticles(item.x, item.y, "✨");
            }

            items.splice(i, 1);
            updateUI();

            level = Math.floor(score / 100) + 1;

            if (lives <= 0) {
                gameOver();
                return;
            }
        } else if (item.y > canvas.height) {
            if (!item.isBomb) {
                lives--;
                updateUI();

                if (lives <= 0) {
                    gameOver();
                    return;
                }
            }
            items.splice(i, 1);
        }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();

        if (particles[i].life <= 0) {
            particles.splice(i, 1);
        }
    }

    requestAnimationFrame(gameLoop);
}

function startGame() {
    document.getElementById("startScreen").classList.add("hidden");
    gameRunning = true;
    updateUI();
    gameLoop();
}

function gameOver() {
    gameRunning = false;
    document.getElementById("finalScore").textContent = score;
    document.getElementById("gameOverScreen").classList.remove("hidden");
}

function restartGame() {
    score = 0;
    lives = 3;
    level = 1;
    items.length = 0;
    particles.length = 0;

    updateUI();
    document.getElementById("gameOverScreen").classList.add("hidden");

    gameRunning = true;
    gameLoop();
}

// Kontrol mouse
window.addEventListener("mousemove", (e) => {
    basket.x = e.clientX;
});

// Kontrol touch
window.addEventListener("touchmove", (e) => {
    basket.x = e.touches[0].clientX;
    e.preventDefault();
}, { passive: false });
</script>

</body>
</html>
