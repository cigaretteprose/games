<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗿 Rock-Paper-Scissors ROAST! 🔥</title>
    <style>
        body { 
            font-family: 'Arial Black', sans-serif; 
            background: linear-gradient(135deg, #ff4757, #ffa502, #2ed573); 
            color: white; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh; 
            overflow: hidden; 
        }
        h1 { 
            font-size: 2.2em; 
            text-shadow: 3px 3px 0 #000; 
            margin: 10px 0; 
            animation: glow 2s infinite alternate; 
        }
        @keyframes glow { 0% { text-shadow: 0 0 20px #fff; } 100% { text-shadow: 0 0 30px #ff0, 0 0 40px #ff0; } }
        
        .choices { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin: 30px 0; 
            flex-wrap: wrap; 
        }
        .choice-btn { 
            font-size: 4em; 
            width: 100px; 
            height: 100px; 
            border: 5px solid #fff; 
            border-radius: 50%; 
            background: rgba(255,255,255,0.2); 
            color: white; 
            cursor: pointer; 
            transition: all 0.3s; 
            backdrop-filter: blur(10px); 
        }
        .choice-btn:hover { 
            transform: scale(1.2) rotate(10deg); 
            background: rgba(255,255,255,0.4); 
            box-shadow: 0 0 30px rgba(255,255,255,0.5); 
        }
        .choice-btn:active { transform: scale(0.95); }

        #game-area { 
            min-height: 200px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            font-size: 1.5em; 
        }
        #result { 
            font-size: 2.5em; 
            margin: 20px 0; 
            text-shadow: 2px 2px 0 #000; 
            min-height: 80px; 
        }
        .score { 
            font-size: 2em; 
            margin: 10px; 
            text-shadow: 2px 2px 0 #000; 
        }
        .trash-talk { 
            font-size: 1.3em; 
            background: rgba(0,0,0,0.5); 
            padding: 15px; 
            border-radius: 20px; 
            margin: 10px auto; 
            max-width: 90%; 
            font-style: italic; 
        }
        #reset-btn { 
            font-size: 1.2em; 
            padding: 12px 25px; 
            background: #ff6b6b; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            margin-top: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
        }
        #reset-btn:hover { background: #ff5252; transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>🗿✂️📄 ROASTED BY AI! 🔥</h1>
    
    <div class="score">You: <span id="player-score">0</span> | AI: <span id="ai-score">0</span></div>
    
    <div id="game-area">
        <div id="result">👊 Pick your weapon!</div>
        <div class="trash-talk" id="trash-talk">AI is warming up its savage mode... 😈</div>
    </div>
    
    <div class="choices">
        <button class="choice-btn" onclick="play('rock')">🗿</button>
        <button class="choice-btn" onclick="play('paper')">📄</button>
        <button class="choice-btn" onclick="play('scissors')">✂️</button>
    </div>
    
    <button id="reset-btn" onclick="resetGame()">🔄 New Game</button>

    <script>
        const trashTalks = {
            win: [
                "💀 My grandma plays better than you!",
                "😂 Did you learn that from a toddler?",
                "🤡 Even a rock has more strategy!",
                "😭 Press F for your dignity!",
                "🔥 Roasted! You're paper to my scissors!"
            ],
            lose: [
                "😤 Lucky shot, human. Won't happen again!",
                "🤬 I'll crush you next round!",
                "💪 Respect... for now.",
                "😏 Don't get cocky, meatbag!",
                "🔥 Warmup complete. Prepare to lose!"
            ],
            tie: [
                "😑 Boring. Try harder.",
                "🤷‍♂️ Copycat much?",
                "😴 Yawn. Make it interesting!",
                "🙄 Predictable AF.",
                "⚖️ Stalemate. Lame!"
            ]
        };

        let playerScore = 0;
        let aiScore = 0;

        function getRandomTrashTalk(type) {
            const talks = trashTalks[type];
            return talks[Math.floor(Math.random() * talks.length)];
        }

        function getAIChoice() {
            const choices = ['rock', 'paper', 'scissors'];
            return choices[Math.floor(Math.random() * 3)];
        }

        function getResult(player, ai) {
            if (player === ai) return 'tie';
            if (
                (player === 'rock' && ai === 'scissors') ||
                (player === 'paper' && ai === 'rock') ||
                (player === 'scissors' && ai === 'paper')
            ) return 'win';
            return 'lose';
        }

        function play(playerChoice) {
            const aiChoice = getAIChoice();
            const result = getResult(playerChoice, aiChoice);
            
            // Show choices
            document.getElementById('result').innerHTML = 
                `You: ${getEmoji(playerChoice)} vs AI: ${getEmoji(aiChoice)}<br><span style="font-size:0.6em;">${result.toUpperCase()}</span>`;
            
            // Update scores
            if (result === 'win') {
                playerScore++;
                document.getElementById('trash-talk').textContent = getRandomTrashTalk('win');
                document.getElementById('result').innerHTML += '<br>🎉 YOU WIN!';
            } else if (result === 'lose') {
                aiScore++;
                document.getElementById('trash-talk').textContent = getRandomTrashTalk('lose');
                document.getElementById('result').innerHTML += '<br>💀 AI WINS!';
            } else {
                document.getElementById('trash-talk').textContent = getRandomTrashTalk('tie');
                document.getElementById('result').innerHTML += '<br>🤝 TIE!';
            }
            
            updateScore();
        }

        function getEmoji(choice) {
            const emojis = { rock: '🗿', paper: '📄', scissors: '✂️' };
            return emojis[choice];
        }

        function updateScore() {
            document.getElementById('player-score').textContent = playerScore;
            document.getElementById('ai-score').textContent = aiScore;
        }

        function resetGame() {
            playerScore = 0;
            aiScore = 0;
            updateScore();
            document.getElementById('result').textContent = '👊 Pick your weapon!';
            document.getElementById('trash-talk').textContent = 'AI is warming up its savage mode... 😈';
        }
    </script>
</body>
</html>
